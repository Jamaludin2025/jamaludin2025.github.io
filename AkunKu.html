<!doctype html>
<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun Website &amp; Aplikasi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-backdrop {
            backdrop-filter: blur(5px);
            background-color: rgba(15, 23, 42, 0.4);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="min-h-screen pb-8 pt-4 sm:pt-6">
  
  <main class="w-full max-w-3xl mx-auto px-4 sm:px-6">
   
   <div class="bg-white rounded-2xl shadow-sm border border-slate-200 mb-5 overflow-hidden">
       <div id="header-toggle-btn" class="px-4 py-3 sm:px-5 sm:py-3.5 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors">
           <div class="flex items-center gap-3">
               <div class="w-7 h-7 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center shadow-sm">
                   <i class="bi bi-shield-lock-fill text-sm"></i>
               </div>
               <h1 class="text-base sm:text-lg font-bold uppercase text-slate-900 tracking-tight m-0">Daftar Akun Saya</h1>
           </div>
           <div class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-200 transition-colors">
               <i id="header-chevron" class="bi bi-chevron-down text-lg text-slate-400 transition-transform duration-300"></i>
           </div>
       </div>

       <div id="header-dropdown" class="hidden border-t border-slate-100 p-4 bg-slate-50/50">
           <div class="flex flex-col md:flex-row gap-3 justify-between items-center">
               
               <div class="flex items-center gap-4 px-2 w-full md:w-auto justify-center md:justify-start">
                   <div class="flex items-center gap-2.5">
                       <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-blue-600 shadow-inner">
                           <i class="bi bi-globe text-base"></i>
                       </div>
                       <div>
                           <p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider leading-none mb-1">Website</p>
                           <p id="website-count" class="text-lg font-bold text-slate-800 leading-none">0</p>
                       </div>
                   </div>
                   <div class="w-px h-6 bg-slate-300"></div>
                   <div class="flex items-center gap-2.5">
                       <div class="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center text-emerald-600 shadow-inner">
                           <i class="bi bi-phone text-base"></i>
                       </div>
                       <div>
                           <p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider leading-none mb-1">Aplikasi</p>
                           <p id="app-count" class="text-lg font-bold text-slate-800 leading-none">0</p>
                       </div>
                   </div>
               </div>

               <div class="flex items-center gap-2.5 w-full md:w-auto">
                   <div class="relative flex-1 md:w-60">
                       <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                           <i class="bi bi-search text-slate-400 text-xs"></i>
                       </div>
                       <input type="text" id="search-input" placeholder="Cari data akun..." class="w-full pl-9 pr-9 py-2 bg-white border border-slate-200 rounded-lg text-xs focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all font-medium text-slate-700 placeholder-slate-400 shadow-sm outline-none">
                       <button id="clear-search" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 hidden"> 
                           <i class="bi bi-x-circle-fill text-sm"></i> 
                       </button>
                   </div>
                   
                   <button onclick="exportToPDF(this)" class="px-3 py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-lg text-[15px] font-semibold shadow-sm flex items-center gap-1.5 transition-all flex-shrink-0">
                       <i class="bi bi-file-earmark-pdf-fill"></i>
                       <span class="hidden sm:inline">Ekspor PDF</span>
                   </button>
               </div>

           </div>
       </div>
   </div>

   <div class="grid grid-cols-2 gap-3 sm:gap-4" id="accounts-container">
    <button id="add-account-btn" class="w-full min-h-[120px] rounded-2xl border border-dashed border-slate-300 hover:border-blue-500 hover:bg-blue-50/50 flex flex-col items-center justify-center gap-2 transition-all duration-200 group focus:outline-none focus:ring-2 focus:ring-blue-500/50">
        <div class="w-10 h-10 bg-white border border-slate-200 rounded-xl shadow-sm flex items-center justify-center text-slate-400 group-hover:text-blue-600 group-hover:scale-110 transition-all duration-300">
            <i class="bi bi-plus-lg text-lg"></i>
        </div>
        <span class="text-xs font-semibold text-slate-500 group-hover:text-blue-600">Tambah Akun</span>
    </button>
   </div>
  </main>
  
  <div id="modal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-50 p-4 overflow-y-auto">
   <div class="bg-white rounded-2xl p-5 sm:p-6 max-w-sm sm:max-w-md w-full shadow-2xl my-8 max-h-[90vh] overflow-y-auto relative animate-fade-in custom-scrollbar">
    <div class="absolute top-4 right-4">
        <button id="modal-close-icon" class="w-7 h-7 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-700 transition-colors">
            <i class="bi bi-x-lg text-xs"></i>
        </button>
    </div>

    <div class="text-center mb-6 mt-1">
        <h2 class="text-lg font-bold text-slate-900" id="modal-title-text">Tambah Akun Baru</h2>
        <p class="text-xs text-slate-500 mt-1">Lengkapi informasi kredensial di bawah ini.</p>
    </div>

    <div class="flex justify-center mb-6">
     <div class="bg-slate-100 rounded-lg p-1 flex w-full max-w-[240px]">
         <button type="button" id="website-switch" class="flex-1 py-1.5 rounded-md text-xs font-semibold transition-all text-slate-500 hover:text-slate-700"> <i class="bi bi-globe mr-1"></i> Website </button> 
         <button type="button" id="app-switch" class="flex-1 py-1.5 rounded-md text-xs font-semibold transition-all bg-white text-blue-600 shadow-sm"> <i class="bi bi-phone mr-1"></i> Aplikasi </button>
     </div>
    </div>

    <form id="account-form" class="space-y-4 text-left">
    <div>
         <label for="app-image" class="block text-xs font-semibold text-slate-700 mb-1">Logo/Gambar Kustom</label> 
         <input type="file" id="app-image" accept="image/*" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-500 file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-white file:text-slate-700 file:shadow-sm hover:file:bg-slate-100 transition-all cursor-pointer">
     </div>
     
     <div>
         <label for="app-name" id="name-label" class="block text-xs font-semibold text-slate-700 mb-1">Nama Aplikasi</label> 
         <input type="text" id="app-name" class="w-full px-3 h-10 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-xs font-medium text-slate-800 outline-none" placeholder="Contoh: Instagram, Gmail, dll" required>
     </div>
     
     <div id="website-link-field" class="hidden">
         <label for="website-link" class="block text-xs font-semibold text-slate-700 mb-1">Tautan Website</label> 
         <input type="url" id="website-link" class="w-full px-3 h-10 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-xs font-medium text-slate-800 outline-none" placeholder="https://example.com">
     </div>
     
     <div class="p-3 bg-slate-50 border border-slate-100 rounded-xl space-y-3">
         <div>
          <div class="flex items-center justify-between mb-1">
              <label id="form-username-label" class="text-xs font-semibold text-slate-700">No. HP/Email</label> 
              <button type="button" onclick="editLabel('form-username-label', 'username-label-input')" class="w-6 h-6 flex items-center justify-center bg-white border border-slate-200 text-slate-400 hover:text-blue-600 rounded-md transition-colors shadow-sm" title="Ubah Nama Field"> <i class="bi bi-pencil-square text-[10px]"></i> </button>
          </div>
          <input type="hidden" id="username-label-input" value="No. HP/Email"> 
          <input type="text" id="username" class="w-full px-3 h-10 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-xs font-medium text-slate-800 shadow-sm outline-none" placeholder="Masukkan identitas..." required>
         </div>
         
         <div>
          <div class="flex items-center justify-between mb-1">
              <label id="form-password-label" class="text-xs font-semibold text-slate-700">Password/Kata Sandi</label> 
              <button type="button" onclick="editLabel('form-password-label', 'password-label-input')" class="w-6 h-6 flex items-center justify-center bg-white border border-slate-200 text-slate-400 hover:text-blue-600 rounded-md transition-colors shadow-sm" title="Ubah Nama Field"> <i class="bi bi-pencil-square text-[10px]"></i> </button>
          </div>
          <input type="hidden" id="password-label-input" value="Password/Kata Sandi"> 
          <input type="text" id="password" class="w-full px-3 h-10 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-xs font-medium text-slate-800 shadow-sm outline-none" placeholder="Masukkan kata sandi rahasia..." required>
         </div>
     </div>

     <div id="dynamic-fields" class="space-y-3"></div>
     
     <button type="button" id="add-field-btn" class="w-full py-2.5 border border-dashed border-blue-300 bg-blue-50/50 text-blue-600 rounded-lg hover:bg-blue-50 hover:border-blue-400 transition-all text-xs font-semibold flex items-center justify-center gap-1.5"> 
         <i class="bi bi-plus-circle-fill"></i> Tambah Field Ekstra 
     </button>          
     
     <div class="flex gap-3 pt-5 border-t border-slate-100 mt-5">
         <button type="button" id="cancel-btn" class="flex-1 px-4 py-2.5 bg-white border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 hover:border-slate-300 font-bold text-xs sm:text-sm transition-all"> Batal </button> 
         <button type="submit" class="flex-1 px-4 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-600/20 font-bold text-xs sm:text-sm transition-all"> Simpan Data </button>
     </div>
    </form>
   </div>
  </div>
  
  <div id="detail-modal" class="fixed inset-0 modal-backdrop hidden items-center justify-center z-50 p-4">
   <div class="bg-white rounded-2xl p-5 sm:p-6 max-w-[360px] sm:max-w-sm w-full shadow-2xl relative animate-fade-in">
    
    <div class="text-center mb-6 mt-1">
     <div class="w-14 h-14 mx-auto mb-3 bg-slate-50 rounded-xl flex items-center justify-center overflow-hidden border border-slate-100 shadow-sm relative">
         <img id="detail-img" class="w-full h-full object-cover hidden" alt="App Icon"> 
         <i id="detail-icon" class="bi bi-hdd-network text-2xl text-slate-400"></i>
     </div>
     <h2 id="detail-title" class="text-lg font-extrabold text-slate-900 tracking-tight leading-snug"></h2>
     <span id="detail-type" class="inline-block mt-1.5 px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase tracking-wider rounded-md"></span>
    </div>
    
    <div class="space-y-3.5 max-h-[50vh] overflow-y-auto pr-1 custom-scrollbar">
     
     <div id="detail-website-link" class="hidden">
         <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Link Website</label>
         <div class="flex items-center gap-2 group">
             <input id="detail-link" type="text" readonly class="flex-1 px-3 h-9 bg-slate-50 border border-slate-100 rounded-lg text-slate-800 text-xs font-semibold focus:outline-none"> 
             <button onclick="openWebsite()" class="w-9 h-9 flex-shrink-0 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors" title="Kunjungi Situs"> <i class="bi bi-box-arrow-up-right"></i> </button> 
             <button onclick="copyToClipboard('detail-link', this)" class="w-9 h-9 flex-shrink-0 flex items-center justify-center bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors"> <i class="bi bi-clipboard"></i> </button>
         </div>
     </div>
     
     <div>
         <label id="detail-username-label" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">No. HP/Email</label>
         <div class="flex items-center gap-2">
             <input id="detail-username" type="text" readonly class="flex-1 px-3 h-9 bg-slate-50 border border-slate-100 rounded-lg text-slate-800 text-xs font-semibold focus:outline-none"> 
             <button onclick="copyToClipboard('detail-username', this)" class="w-9 h-9 flex-shrink-0 flex items-center justify-center bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors"> <i class="bi bi-clipboard"></i> </button>
         </div>
     </div>
     
     <div>
         <label id="detail-password-label" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Password/Kata Sandi</label>
         <div class="flex items-center gap-2">
             <input id="detail-password" type="text" readonly class="flex-1 px-3 h-9 bg-slate-50 border border-slate-100 rounded-lg text-slate-800 text-xs font-semibold focus:outline-none"> 
             <button onclick="copyToClipboard('detail-password', this)" class="w-9 h-9 flex-shrink-0 flex items-center justify-center bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors"> <i class="bi bi-clipboard"></i> </button>
         </div>
     </div>

     <div id="detail-dynamic-fields"></div>
    </div>
    
    <div class="grid grid-cols-2 gap-2.5 pt-5 border-t border-slate-100 mt-5">
        <button id="edit-btn" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 font-bold text-xs sm:text-sm transition-colors flex items-center justify-center gap-1.5"> 
            Edit Data 
        </button>
        <button id="print-photo-btn" onclick="exportAccountToImage()" class="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-100 font-bold text-xs sm:text-sm transition-colors flex items-center justify-center gap-1.5"> 
            Cetak Foto 
        </button>        
        <button id="delete-btn" class="px-4 py-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 font-bold text-xs sm:text-sm transition-colors"> 
            Hapus 
        </button> 
        <button id="close-detail-btn" class="px-4 py-2 border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 font-bold text-xs sm:text-sm transition-colors"> 
            Tutup 
        </button>
    </div>
   </div>
  </div>
  
  <script>
        let accounts = JSON.parse(localStorage.getItem('accounts')) || {};
        let currentSlot = null;
        let fieldCounter = 0;
        let currentMode = 'app'; 
        let isEditMode = false; 

        document.getElementById('header-toggle-btn').addEventListener('click', function() {
            const dropdown = document.getElementById('header-dropdown');
            const chevron = document.getElementById('header-chevron');
            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                chevron.style.transform = 'rotate(180deg)';
            } else {
                dropdown.classList.add('hidden');
                chevron.style.transform = 'rotate(0deg)';
            }
        });

        function updateStatistics() {
            const accountsArray = Object.values(accounts);
            const websiteCount = accountsArray.filter(acc => acc.mode === 'website').length;
            const appCount = accountsArray.filter(acc => acc.mode === 'app' || !acc.mode).length;
            
            document.getElementById('website-count').textContent = websiteCount;
            document.getElementById('app-count').textContent = appCount;
        }

        function renderAllAccounts() {
            document.querySelectorAll('.account-card').forEach(card => card.remove());
            const sortedEntries = Object.entries(accounts).sort((a, b) => {
                return a[1].name.toLowerCase().localeCompare(b[1].name.toLowerCase());
            });
            
            sortedEntries.forEach(([slotId, account]) => {
                createNewSlot(slotId);
                displayAccount(slotId, account);
            });
            
            updateStatistics();
        }

        function loadAccounts() {
            renderAllAccounts();
        }

        function createNewSlot(slotId) {
            const container = document.getElementById('accounts-container');
            const addButton = document.getElementById('add-account-btn');
            
            const newSlot = document.createElement('div');
            newSlot.id = `account-${slotId}`;
            newSlot.className = 'account-card group bg-white border border-slate-200 rounded-2xl p-3 sm:p-4 shadow-sm hover:shadow-md hover:border-blue-300 transition-all duration-300 cursor-pointer flex flex-col items-center justify-center w-full min-h-[120px] relative overflow-hidden';
            newSlot.onclick = () => showAccountDetail(slotId);
            
            newSlot.innerHTML = `
                <div class="w-12 h-12 mx-auto mb-2.5 sm:mb-3 bg-slate-50 border border-slate-100 rounded-xl flex items-center justify-center overflow-hidden group-hover:-translate-y-1 transition-all duration-300">
                    <i class="bi bi-box-fill text-xl text-slate-300"></i>
                    <img id="img-${slotId}" class="w-full h-full object-cover hidden" alt="App Icon">
                </div>
                <div id="content-${slotId}" class="text-center w-full">
                    <p class="truncate text-xs font-semibold text-slate-500">Kosong</p>
                </div>
            `;
            
            container.insertBefore(newSlot, addButton);
        }

        function displayAccount(slot, account) {
            const img = document.getElementById(`img-${slot}`);
            const content = document.getElementById(`content-${slot}`);
            
            if (account.image) {
                img.src = account.image;
                img.classList.remove('hidden');
                img.previousElementSibling.style.display = 'none';
                img.onerror = function() {
                    this.classList.add('hidden');
                    this.previousElementSibling.style.display = 'flex';
                };
            }
            
            content.innerHTML = `
                <p class="font-bold text-slate-800 text-[13px] sm:text-sm truncate px-1" title="${account.name}">${account.name}</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${account.mode === 'website' ? 'Website' : 'Aplikasi'}</p>
            `;
        }

        function addDynamicField() {
            fieldCounter++;
            const container = document.getElementById('dynamic-fields');
            
            const fieldDiv = document.createElement('div');
            fieldDiv.className = 'dynamic-field p-3 bg-slate-50 border border-slate-100 rounded-xl animate-fade-in';
            fieldDiv.innerHTML = `
                <div class="flex items-center justify-between mb-1.5">
                    <label id="dynamic-label-${fieldCounter}" class="text-xs font-semibold text-slate-700">Field ${fieldCounter}</label>
                    <div class="flex gap-1">
                        <button type="button" onclick="editLabel('dynamic-label-${fieldCounter}', 'dynamic-label-input-${fieldCounter}')" class="w-6 h-6 flex items-center justify-center bg-white border border-slate-200 text-slate-400 hover:text-blue-600 rounded-md transition-colors shadow-sm" title="Ubah Judul">
                            <i class="bi bi-pencil-square text-[10px]"></i> 
                        </button>
                        <button type="button" onclick="removeDynamicField(this)" class="w-6 h-6 flex items-center justify-center bg-white border border-rose-100 text-rose-400 hover:bg-rose-50 hover:text-rose-600 rounded-md transition-colors shadow-sm" title="Hapus">
                            <i class="bi bi-trash text-[10px]"></i> 
                        </button>
                    </div>
                </div>
                <input type="hidden" id="dynamic-label-input-${fieldCounter}" value="Field ${fieldCounter}">
                <input type="text" id="dynamic-value-${fieldCounter}" class="w-full px-3 h-9 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-xs font-medium text-slate-800 shadow-sm outline-none" placeholder="Masukkan detail data...">
            `;
            
            container.appendChild(fieldDiv);
        }
        
        function removeDynamicField(button) {
            button.closest('.dynamic-field').remove();
        }
        
        function showAccountDetail(slot) {
            if (!accounts[slot]) return;
            
            const account = accounts[slot];
            currentSlot = slot;
            
            document.getElementById('detail-title').textContent = account.name;
            document.getElementById('detail-username').value = account.username;
            document.getElementById('detail-password').value = account.password;
            
            const accountType = account.mode === 'website' ? 'Website' : 'Aplikasi';
            document.getElementById('detail-type').textContent = accountType;
            
            document.getElementById('detail-username-label').textContent = account.usernameLabel || 'No. HP/Email';
            document.getElementById('detail-password-label').textContent = account.passwordLabel || 'Password/Kata Sandi';
            
            const websiteLinkDiv = document.getElementById('detail-website-link');
            if (account.mode === 'website' && account.websiteLink) {
                document.getElementById('detail-link').value = account.websiteLink;
                websiteLinkDiv.classList.remove('hidden');
            } else {
                websiteLinkDiv.classList.add('hidden');
            }
            
            const dynamicContainer = document.getElementById('detail-dynamic-fields');
            dynamicContainer.innerHTML = '';
            
            if (account.dynamicFields) {
                account.dynamicFields.forEach((field, index) => {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.innerHTML = `
                        <div class="mt-3.5">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">${field.label}</label>
                            <div class="flex items-center gap-2">
                                <input type="text" readonly value="${field.value}" class="flex-1 px-3 h-9 bg-slate-50 border border-slate-100 rounded-lg text-slate-800 text-xs font-semibold focus:outline-none">
                                <button onclick="copyToClipboard(this.previousElementSibling, this)" class="w-9 h-9 flex-shrink-0 flex items-center justify-center bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors">
                                    <i class="bi bi-clipboard"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    dynamicContainer.appendChild(fieldDiv);
                });
            }
            
            const detailImg = document.getElementById('detail-img');
            const detailIcon = document.getElementById('detail-icon');
            
            if (account.image) {
                detailImg.src = account.image;
                detailImg.classList.remove('hidden');
                detailIcon.style.display = 'none';
                detailImg.onerror = function() {
                    this.classList.add('hidden');

        function copyToClipboard(element, btn) {
            const targetElement = typeof element === 'string' ? document.getElementById(element) : element;
            targetElement.select();
            document.execCommand('copy');
            
            let button = btn || event.target;
            if (button.tagName === 'I') {
                button = button.parentElement;
            }
            
            const originalHTML = button.innerHTML;
            const originalBgColor = button.style.backgroundColor;
            const originalColor = button.style.color;
            
            button.innerHTML = '<i class="bi bi-clipboard-check"></i>';
            button.style.backgroundColor = '#10B981';
            button.style.color = 'white';
            
            setTimeout(() => {
                button.innerHTML = originalHTML;
                button.style.backgroundColor = originalBgColor;
                button.style.color = originalColor;
            }, 1500);
        }

            } else {

        function editLabel(labelId, hiddenInputId) {
            const label = document.getElementById(labelId);
            const hiddenInput = document.getElementById(hiddenInputId);
            const currentText = label.textContent;
            
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentText;
            input.className = 'w-full max-w-[160px] px-2 py-0.5 bg-blue-50 border border-blue-300 text-blue-700 rounded text-[11px] font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-inner';
            
            label.style.display = 'none';
            label.parentNode.insertBefore(input, label.nextSibling);
            input.focus();
            input.select();
            
            function saveLabel() {
                const newText = input.value.trim() || currentText;
                label.textContent = newText;
                hiddenInput.value = newText;
                label.style.display = 'block';
                input.remove();
            }
            
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveLabel();
                }
            });
            
            input.addEventListener('blur', saveLabel);
        }

                if(confirm("Apakah Anda yakin ingin menghapus akun ini secara permanen?")) {
                    delete accounts[currentSlot];
                    localStorage.setItem('accounts', JSON.stringify(accounts));

            }

        document.getElementById('account-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            if (submitBtn.disabled) return;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split animate-spin mr-1"></i> Proses...';
            
            const appName = document.getElementById('app-name').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!appName || !username || !password) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
                return;
            }
            
            const dynamicFields = [];
            const dynamicFieldElements = document.querySelectorAll('.dynamic-field');
            
            dynamicFieldElements.forEach((fieldElement) => {
                const labelElement = fieldElement.querySelector('[id^="dynamic-label-"]');
                const valueElement = fieldElement.querySelector('[id^="dynamic-value-"]');
                
                if (labelElement && valueElement && valueElement.value.trim()) {
                    dynamicFields.push({
                        label: labelElement.textContent,
                        value: valueElement.value.trim()
                    });
                }
            });
            
            const account = {
                name: appName,
                username: username,
                password: password,
                usernameLabel: document.getElementById('username-label-input').value || 'No. HP/Email',
                passwordLabel: document.getElementById('password-label-input').value || 'Password/Kata Sandi',
                dynamicFields: dynamicFields,
                mode: currentMode,
                websiteLink: currentMode === 'website' ? document.getElementById('website-link').value.trim() : null,
                image: null
            };
            
            function completeSave() {
                try {
                    accounts[currentSlot] = account;
                    localStorage.setItem('accounts', JSON.stringify(accounts));
                    renderAllAccounts(); 
                    closeModal();
                    
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                    currentSlot = null;
                } catch (error) {
                    console.error('Error saving account:', error);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            }
            
            const fileInput = document.getElementById('app-image');
            const file = fileInput.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    account.image = e.target.result;
                    completeSave();
                };
                reader.onerror = function() { completeSave(); };
                reader.readAsDataURL(file);
            } else {
                completeSave();
            }
        });

        function filterAccounts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const clearButton = document.getElementById('clear-search');
            
            if (searchTerm) { clearButton.classList.remove('hidden'); } 
            else { clearButton.classList.add('hidden'); }
            
            document.querySelectorAll('.account-card').forEach(card => {
                const id = card.id.replace('account-', '');
                const account = accounts[id];
                
                if (!account) return; 
                let matches = false;
                
                if (account.name.toLowerCase().includes(searchTerm) || account.username.toLowerCase().includes(searchTerm)) {
                    matches = true;
                }
                if (account.dynamicFields) {
                    account.dynamicFields.forEach(field => {
                        if (field.label.toLowerCase().includes(searchTerm) || field.value.toLowerCase().includes(searchTerm)) {
                            matches = true;
                        }
                    });
                }
                
                if (searchTerm === '' || matches) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        function clearSearch() {
            document.getElementById('search-input').value = '';
            filterAccounts();
        }
        
        function openWebsite() {
            const link = document.getElementById('detail-link').value;
            if (link) { window.open(link, '_blank', 'noopener,noreferrer'); }
        }
        
        document.getElementById('search-input').addEventListener('input', filterAccounts);
        document.getElementById('clear-search').addEventListener('click', clearSearch);

                            <div style="margin-bottom: 8px;">
                                <span style="font-size: 11px; font-weight: bold; color: #718096; display: block; text-transform: uppercase; letter-spacing: 0.5px;">${acc.usernameLabel || 'No. HP/Email'}</span>
                                <span style="font-size: 13px; color: #2d3748; display: block; padding: 5px 10px; background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 3px; word-break: break-all; font-weight: 500;">${acc.username}</span>
                            </div>
                            <div style="margin-bottom: 8px;">
                                <span style="font-size: 11px; font-weight: bold; color: #718096; display: block; text-transform: uppercase; letter-spacing: 0.5px;">${acc.passwordLabel || 'Password'}</span>
                                <span style="font-size: 13px; color: #2d3748; display: block; padding: 5px 10px; background: #f8fafc; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 3px; word-break: break-all; font-weight: 500;">${acc.password}</span>
                            </div>
                            ${dynamicFieldsHtml}
                        </div>
                    </div>
                `;
                contentDiv.innerHTML += itemHtml;
            });

            pdfContainer.appendChild(contentDiv);

            const dateObj = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            const dayName = days[dateObj.getDay()];
            const dateNum = dateObj.getDate();
            const monthName = months[dateObj.getMonth()];
            const year = dateObj.getFullYear();
            
            const h = String(dateObj.getHours()).padStart(2, '0');
            const m = String(dateObj.getMinutes()).padStart(2, '0');
            const s = String(dateObj.getSeconds()).padStart(2, '0');
            
            const formattedFooterText = `Dicetak pada ${dayName}, ${dateNum} ${monthName} ${year} | ${h}.${m}.${s}`;

            const opt = {
                margin:       0.5,
                filename:     'Daftar_Akun_Website_Aplikasi.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="bi bi-hourglass-split animate-spin text-lg"></i><span class="hidden sm:inline">Proses...</span>`;
            btn.disabled = true;

            html2pdf().set(opt).from(pdfContainer).toPdf().get('pdf').then(function(pdf) {
                const totalPages = pdf.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    pdf.setPage(i);
                    pdf.setFontSize(9);
                    pdf.setTextColor(113, 128, 150);
                    pdf.setFont("helvetica", "italic");
                    pdf.text(formattedFooterText, 8.0, 10.5, { align: 'right' });
                }
            }).save().then(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error("PDF Export Error:", err);
                alert("Terjadi kesalahan saat mengekspor ke format PDF.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        loadAccounts();
    </script>
 </body>
</html>
